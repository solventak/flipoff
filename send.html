<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlipOff — Send</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #F0F0F0;
      color: #111;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .header a {
      font-size: 14px;
      color: #666;
      text-decoration: none;
      font-weight: 500;
    }

    .header a:hover { color: #000; }

    .section {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .section h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      margin-bottom: 20px;
    }

    /* Board preview */
    .board-preview {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row-wrap {
      position: relative;
    }

    .row-input {
      width: 100%;
      padding: 10px 48px 10px 12px;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: border-color 0.15s;
      background: #FAFAFA;
    }

    .row-input:focus {
      outline: none;
      border-color: #999;
      background: #fff;
    }

    .row-input.has-content {
      border-color: #111;
      background: #fff;
    }

    .char-count {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: #ccc;
      font-family: monospace;
      pointer-events: none;
    }

    .char-count.warn { color: #FF9500; }
    .char-count.full { color: #ff3b30; }

    /* Duration */
    .duration-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .duration-row label {
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }

    .duration-row input[type="number"] {
      width: 80px;
      padding: 8px 10px;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .duration-row input[type="number"]:focus {
      outline: none;
      border-color: #999;
    }

    .duration-row .hint {
      font-size: 12px;
      color: #aaa;
    }

    /* Actions */
    .action-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .send-btn {
      padding: 12px 32px;
      background: #111;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
    }

    .send-btn:hover { background: #333; }
    .send-btn:active { transform: scale(0.98); }
    .send-btn:disabled { background: #ccc; cursor: default; transform: none; }

    .clear-btn {
      padding: 12px 20px;
      background: #fff;
      color: #ff3b30;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      border: 1.5px solid #ff3b30;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .clear-btn:hover { background: #fff5f5; }
    .clear-btn:disabled { opacity: 0.4; cursor: default; }

    .status {
      font-size: 13px;
      color: #aaa;
      flex: 1;
      text-align: right;
    }

    .status.ok { color: #00AA55; }
    .status.err { color: #ff3b30; }
    .status.sending { color: #888; }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>FlipOff. Send</h1>
    <a href="/config">← Config</a>
  </div>

  <div id="loading" class="loading">Loading display config…</div>

  <div id="ui" style="display:none">
    <!-- Message rows -->
    <div class="section">
      <h2>Message</h2>
      <div class="board-preview" id="board-preview"></div>
    </div>

    <!-- Duration -->
    <div class="section">
      <h2>Duration</h2>
      <div class="duration-row">
        <label>Show for</label>
        <input type="number" id="duration" min="1" step="5" value="30">
        <span class="hint">seconds, then revert</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="section">
      <div class="action-bar">
        <button class="send-btn" id="send-btn">Send ↗</button>
        <button class="clear-btn" id="clear-btn">Clear display</button>
        <span class="status" id="status"></span>
      </div>
    </div>
  </div>
</div>

<script>
  let cols = 16;
  let rows = 10;
  let defaultDuration = 30;
  let inputs = [];

  async function init() {
    const res = await fetch('/api/config');
    const cfg = await res.json();

    cols = cfg.grid.cols;
    rows = cfg.grid.rows;
    defaultDuration = cfg.timing.temp_message_duration ?? 30;

    document.getElementById('duration').value = defaultDuration;
    buildBoard();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
  }

  function buildBoard() {
    const preview = document.getElementById('board-preview');
    preview.innerHTML = '';
    inputs = [];

    for (let r = 0; r < rows; r++) {
      const wrap = document.createElement('div');
      wrap.className = 'row-wrap';

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'row-input';
      input.maxLength = cols;
      input.placeholder = `Row ${r + 1}`;
      input.setAttribute('autocomplete', 'off');
      input.setAttribute('autocorrect', 'off');
      input.setAttribute('autocapitalize', 'characters');
      input.setAttribute('spellcheck', 'false');

      const counter = document.createElement('span');
      counter.className = 'char-count';
      counter.textContent = `0/${cols}`;

      input.addEventListener('input', () => {
        // Force uppercase
        const pos = input.selectionStart;
        input.value = input.value.toUpperCase();
        input.setSelectionRange(pos, pos);

        const len = input.value.length;
        counter.textContent = `${len}/${cols}`;
        counter.className = 'char-count' + (len === cols ? ' full' : len >= cols * 0.8 ? ' warn' : '');
        input.className = 'row-input' + (len > 0 ? ' has-content' : '');
      });

      wrap.appendChild(input);
      wrap.appendChild(counter);
      preview.appendChild(wrap);
      inputs.push(input);
    }
  }

  async function send() {
    const message = inputs.map(i => i.value);
    const duration = parseInt(document.getElementById('duration').value) || defaultDuration;
    const statusEl = document.getElementById('status');
    const sendBtn = document.getElementById('send-btn');
    const clearBtn = document.getElementById('clear-btn');

    sendBtn.disabled = true;
    clearBtn.disabled = true;
    statusEl.className = 'status sending';
    statusEl.textContent = 'Sending…';

    try {
      const res = await fetch('/api/temp-message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, duration }),
      });

      if (!res.ok) throw new Error(res.statusText);

      statusEl.className = 'status ok';
      statusEl.textContent = `Sent ✓ — reverts in ${duration}s`;
      setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'status'; }, duration * 1000);
    } catch (e) {
      statusEl.className = 'status err';
      statusEl.textContent = 'Error — ' + e.message;
    } finally {
      sendBtn.disabled = false;
      clearBtn.disabled = false;
    }
  }

  async function clearDisplay() {
    const statusEl = document.getElementById('status');
    const sendBtn = document.getElementById('send-btn');
    const clearBtn = document.getElementById('clear-btn');

    sendBtn.disabled = true;
    clearBtn.disabled = true;
    statusEl.className = 'status sending';
    statusEl.textContent = 'Clearing…';

    try {
      const res = await fetch('/api/temp-message', { method: 'DELETE' });
      if (!res.ok) throw new Error(res.statusText);
      statusEl.className = 'status ok';
      statusEl.textContent = 'Cleared ✓';
      setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'status'; }, 2000);
    } catch (e) {
      statusEl.className = 'status err';
      statusEl.textContent = 'Error — ' + e.message;
    } finally {
      sendBtn.disabled = false;
      clearBtn.disabled = false;
    }
  }

  // Cmd/Ctrl+Enter to send
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') send();
  });

  document.getElementById('send-btn').addEventListener('click', send);
  document.getElementById('clear-btn').addEventListener('click', clearDisplay);

  init();
</script>
</body>
</html>
